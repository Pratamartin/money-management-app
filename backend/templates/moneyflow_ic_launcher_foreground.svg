<svg width="108" height="108" viewBox="0 0 108 108" xmlns="http://www.w3.org/2000/svg">
  <!-- Foreground only (sem background) para Adaptive Icon Android -->
  <!-- Bills peeking from top -->
  <rect x="30" y="24" width="22" height="12" rx="3" fill="#9FE1CB" opacity="0.9"/>
  <rect x="36" y="20" width="22" height="12" rx="3" fill="#E1F5EE" opacity="0.88"/>

  <!-- Wallet flap -->
  <rect x="14" y="38" width="80" height="16" rx="6" fill="#0F6E56"/>

  <!-- Wallet body -->
  <rect x="14" y="48" width="80" height="38" rx="6" fill="#085041"/>

  <!-- Divider line -->
  <line x1="14" y1="52" x2="94" y2="52" stroke="#1D9E75" stroke-width="1"/>

  <!-- Coin pocket -->
  <rect x="72" y="54" width="18" height="18" rx="5" fill="#1D9E75"/>
  <circle cx="81" cy="63" r="6" fill="none" stroke="#9FE1CB" stroke-width="1.8"/>
  <text x="76.5" y="66.5" font-family="'Helvetica Neue', Arial, sans-serif" font-size="5.5" font-weight="700" fill="#E1F5EE">R$</text>

  <!-- Card lines -->
  <rect x="20" y="56" width="44" height="5" rx="2.5" fill="#0F6E56" opacity="0.85"/>
  <rect x="20" y="65" width="32" height="5" rx="2.5" fill="#0F6E56" opacity="0.55"/>
</svg>
